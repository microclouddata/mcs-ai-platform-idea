services:
  mongodb:
    image: mongo:7.0
    container_name: mcs-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mcs-backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/mcs_ai_platform
      APP_JWT_SECRET: ${APP_JWT_SECRET:-cmVwbGFjZS13aXRoLXlvdXItYWN0dWFsLWp3dC1zZWNyZXQtbWluaW11bS0zMi1ieXRlcw==}
      APP_STORAGE_PATH: /app/uploads
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://frontend:3000
      LLM_MOCK_ENABLED: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: /api
        BACKEND_URL: http://backend:8081
    container_name: mcs-frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8081
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongodb_data:
  backend_uploads:
