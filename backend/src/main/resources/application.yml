server:
  port: 8081

spring:
  application:
    name: ai-platform-backend
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/mcs_ai_platform}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # No password for local dev; set REDIS_PASSWORD in K8s Secret for production.
      password: ${REDIS_PASSWORD:}
      connect-timeout: 2s
      timeout: 1s
  kafka:
    # In Docker: KAFKA_BOOTSTRAP_SERVERS=kafka:9092 (set via docker-compose env)
    # Local dev (backend outside Docker): uses localhost:9093 (the host-facing listener)
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # Acks from all in-sync replicas for durability (set to 1 in single-broker dev)
      acks: all
      retries: 3
    consumer:
      group-id: ai-platform
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        # Trust event classes for JSON deserialization
        spring.json.trusted.packages: "com.mcs.aiplatform.kafka.event"
        # Let Spring infer the target type from the __TypeId__ header set by JsonSerializer
        spring.json.use.type.headers: true
  cache:
    type: redis
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  cors:
    # In production the gateway handles CORS for external traffic; these origins are
    # only needed when the backend is accessed directly (local dev without gateway).
    # http://localhost:8080 covers requests routed through the local gateway instance.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080,http://73.197.30.143:3000/,http://aiplatform.microcloudsoftware.com:3000/}
  jwt:
    secret: ${APP_JWT_SECRET:cUVHUmhsQ1ReaGF1OWhlMzM5JHJyRjZuUEVYaXUlemt5JDdjJVpuYjdsQklIVndSVVVXSXNmS0FWSyZodUVqKg==}
    expiration-ms: 86400000
  storage:
    local-path: ${APP_STORAGE_PATH:/app/uploads}
  llm:
    mock-enabled: ${LLM_MOCK_ENABLED:false}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: https://api.openai.com
      model: gpt-3.5-turbo
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: qwen2.5-coder:14b

llm:
  mock-mode: ${LLM_MOCK_ENABLED:false}
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  embedding:
    model: ${LLM_EMBEDDING_MODEL:text-embedding-3-small}

management:
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    org.springframework.security: INFO