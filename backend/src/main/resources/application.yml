server:
  port: 8081

spring:
  application:
    name: ai-platform-backend
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/mcs_ai_platform}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # No password for local dev; set REDIS_PASSWORD in K8s Secret for production.
      password: ${REDIS_PASSWORD:}
      connect-timeout: 2s
      timeout: 1s
  cache:
    type: redis

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
  jwt:
    secret: ${APP_JWT_SECRET:cUVHUmhsQ1ReaGF1OWhlMzM5JHJyRjZuUEVYaXUlemt5JDdjJVpuYjdsQklIVndSVVVXSXNmS0FWSyZodUVqKg==}
    expiration-ms: 86400000

management:
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    org.springframework.security: INFO