server:
  port: 8081

spring:
  application:
    name: ai-platform-backend
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/mcs_ai_platform}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://73.197.30.143:3000/,http://aiplatform.microcloudsoftware.com:3000/}
  jwt:
    secret: ${APP_JWT_SECRET:cUVHUmhsQ1ReaGF1OWhlMzM5JHJyRjZuUEVYaXUlemt5JDdjJVpuYjdsQklIVndSVVVXSXNmS0FWSyZodUVqKg==}
    expiration-ms: 86400000
  storage:
    local-path: ${APP_STORAGE_PATH:/app/uploads}
  llm:
    mock-enabled: ${LLM_MOCK_ENABLED:false}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: https://api.openai.com
      model: gpt-3.5-turbo
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: qwen2.5-coder:14b

llm:
  mock-mode: ${LLM_MOCK_ENABLED:false}
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  embedding:
    model: ${LLM_EMBEDDING_MODEL:text-embedding-3-small}

logging:
  level:
    org.springframework.security: INFO