name: Gateway CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'gateway/**'
      - '.github/workflows/gateway.yml'
  pull_request:
    branches: [main]
    paths:
      - 'gateway/**'
      - '.github/workflows/gateway.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mcs-ai-platform-gateway

jobs:
  # ── Job 1: 编译（PR + push 都触发）────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn package -B -DskipTests
        working-directory: gateway

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-jar
          path: gateway/target/api-gateway-*.jar
          retention-days: 7

  # ── Job 2: 构建并推送 Docker 镜像（仅 push to main）────────────────
  docker-publish:
    name: Docker Publish
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: 部署到 Kubernetes（push to main + 手动审批）─────────────
  deploy:
    name: Deploy to K8s
    needs: docker-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update gateway image
        run: |
          kubectl set image deployment/gateway \
            gateway=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -n mcs-ai-platform
          kubectl annotate deployment/gateway \
            kubernetes.io/change-cause="CI deploy ${{ github.sha }}" \
            -n mcs-ai-platform --overwrite

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/gateway \
            -n mcs-ai-platform \
            --timeout=300s

      - name: Verify pod status
        run: kubectl get pods -n mcs-ai-platform -l app=gateway
