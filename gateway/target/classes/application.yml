server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      routes:
        # ── Public: auth endpoints → auth-service ────────────────────────────
        - id: auth-route
          uri: ${AUTH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authCircuitBreaker
                fallbackUri: forward:/fallback

        # ── Public: health passthrough → backend ──────────────────────────────
        - id: actuator-route
          uri: ${BACKEND_URL:http://localhost:8081}
          predicates:
            - Path=/actuator/**

        # ── Protected: agent endpoints → agent-service ──────────────────────
        - id: agent-route
          uri: ${AGENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/agents/**
          filters:
            - JwtAuth
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: agentCircuitBreaker
                fallbackUri: forward:/fallback

        # ── Protected: chat + model endpoints → chat-service ────────────────
        - id: chat-route
          uri: ${CHAT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/chat/**,/api/models/**
          filters:
            - JwtAuth
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: chatCircuitBreaker
                fallbackUri: forward:/fallback

        # ── Protected: document/RAG endpoints → rag-service ─────────────────
        - id: rag-route
          uri: ${RAG_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/documents/**,/api/rag/**
          filters:
            - JwtAuth
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: ragCircuitBreaker
                fallbackUri: forward:/fallback

        # ── Protected: usage endpoints → usage-service ──────────────────────
        - id: usage-route
          uri: ${USAGE_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/usage/**
          filters:
            - JwtAuth
            - name: CircuitBreaker
              args:
                name: usageCircuitBreaker
                fallbackUri: forward:/fallback

        # ── Protected: remaining API routes → backend (legacy) ───────────────
        - id: api-route
          uri: ${BACKEND_URL:http://localhost:8081}
          predicates:
            - Path=/api/**
          filters:
            - JwtAuth
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: backendCircuitBreaker
                fallbackUri: forward:/fallback

# Circuit Breaker configuration (Resilience4j)
resilience4j:
  circuitbreaker:
    instances:
      backendCircuitBreaker: &cbDefaults
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
      authCircuitBreaker:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
      agentCircuitBreaker:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
      chatCircuitBreaker:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
      ragCircuitBreaker:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
      usageCircuitBreaker:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3

app:
  jwt:
    secret: ${APP_JWT_SECRET:cUVHUmhsQ1ReaGF1OWhlMzM5JHJyRjZuUEVYaXUlemt5JDdjJVpuYjdsQklIVndSVVVXSXNmS0FWSyZodUVqKg==}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.mcs.gateway: INFO
