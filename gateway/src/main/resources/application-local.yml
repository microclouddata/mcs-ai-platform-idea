# Local development profile — no Redis required (rate limiting disabled)
app:
  jwt:
    secret: ${APP_JWT_SECRET:cUVHUmhsQ1ReaGF1OWhlMzM5JHJyRjZuUEVYaXUlemt5JDdjJVpuYjdsQklIVndSVVVXSXNmS0FWSyZodUVqKg==}

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
  cloud:
    gateway:
      routes:
        - id: auth-route
          uri: ${AUTH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authCircuitBreaker
                fallbackUri: forward:/fallback

        - id: actuator-route
          uri: ${BACKEND_URL:http://localhost:8081}
          predicates:
            - Path=/actuator/**

        - id: agent-route
          uri: ${AGENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/agents/**
          filters:
            - JwtAuth
            - name: CircuitBreaker
              args:
                name: agentCircuitBreaker
                fallbackUri: forward:/fallback

        - id: chat-route
          uri: ${CHAT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/chat/**,/api/models/**
          filters:
            - JwtAuth
            - name: CircuitBreaker
              args:
                name: chatCircuitBreaker
                fallbackUri: forward:/fallback

        - id: rag-route
          uri: ${RAG_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/documents/**,/api/rag/**
          filters:
            - JwtAuth
            - name: CircuitBreaker
              args:
                name: ragCircuitBreaker
                fallbackUri: forward:/fallback

        - id: usage-route
          uri: ${USAGE_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/usage/**
          filters:
            - JwtAuth
            - name: CircuitBreaker
              args:
                name: usageCircuitBreaker
                fallbackUri: forward:/fallback

        - id: api-route
          uri: ${BACKEND_URL:http://localhost:8081}
          predicates:
            - Path=/api/**
          filters:
            - JwtAuth
            - name: CircuitBreaker
              args:
                name: backendCircuitBreaker
                fallbackUri: forward:/fallback
