# Prerequisite: nginx ingress controller must be installed.
# minikube: minikube addons enable ingress
# kind/bare cluster: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
#
# Add to /etc/hosts: <cluster-ip> mcs-ai-platform.local
# minikube: minikube ip
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcs-ingress
  namespace: mcs-ai-platform
  annotations:
    # Allow uploads up to 25MB (matches the 20MB multipart limit with buffer)
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
spec:
  ingressClassName: nginx
  rules:
    - host: mcs-ai-platform.local
      http:
        paths:
          # Route /api/* directly to the backend.
          # No rewrite needed — Spring Boot controllers already handle /api/** paths.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 8080
          # Jaeger UI — accessible at http://mcs-ai-platform.local/jaeger/
          # nginx strips the /jaeger prefix before forwarding (rewrite-target: /).
          - path: /jaeger
            pathType: Prefix
            backend:
              service:
                name: jaeger
                port:
                  number: 16686
          # Route everything else to the Next.js frontend.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
