apiVersion: v1
kind: ConfigMap
metadata:
  name: mcs-config
  namespace: mcs-ai-platform
data:
  SPRING_DATA_MONGODB_URI: "mongodb://mongodb:27017/mcs_ai_platform"
  APP_STORAGE_PATH: "/app/uploads"
  CORS_ALLOWED_ORIGINS: "http://mcs-ai-platform.local,http://localhost:3000"
  LLM_MOCK_ENABLED: "false"
  OPENAI_BASE_URL: "https://api.openai.com/v1"
  LLM_EMBEDDING_MODEL: "text-embedding-3-small"
  OLLAMA_BASE_URL: "http://localhost:11434"
  # Service URLs used by the API Gateway
  BACKEND_URL: "http://backend-service:8081"
  AUTH_SERVICE_URL: "http://auth-service:8082"
  AGENT_SERVICE_URL: "http://agent-service:8083"
  CHAT_SERVICE_URL: "http://chat-service:8084"
  RAG_SERVICE_URL: "http://rag-service:8085"
  USAGE_SERVICE_URL: "http://usage-service:8086"
  # Gateway URL used by the frontend
  GATEWAY_URL: "http://gateway-service:8080"
  # Ollama (local LLM)
  OLLAMA_MODEL: "gemma3:4b"
  # Kafka — event-driven async document processing and usage recording
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  # Redis — Spring Cache + distributed rate limiting
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  # OpenTelemetry Java Agent configuration
  # OTEL_SERVICE_NAME identifies this service in Jaeger traces
  OTEL_SERVICE_NAME: "mcs-ai-platform-backend"
  # Send traces to the OTEL Collector via OTLP gRPC
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "none"
  OTEL_LOGS_EXPORTER: "none"
  # Propagate trace context across HTTP boundaries (W3C TraceContext standard)
  OTEL_PROPAGATORS: "tracecontext,baggage"
