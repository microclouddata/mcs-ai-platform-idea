apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: mcs-ai-platform
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        - name: wait-for-mongodb
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for MongoDB at mongodb:27017..."
              until nc -z mongodb 27017; do sleep 3; done
              echo "MongoDB ready!"
      containers:
        - name: auth-service
          image: mcs-auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_DATA_MONGODB_URI
              value: "mongodb://mongodb:27017/mcs_ai_platform"
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mcs-secrets
                  key: APP_JWT_SECRET
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: mcs-config
                  key: CORS_ALLOWED_ORIGINS
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
